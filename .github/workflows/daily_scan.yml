name: 台股蔡森每日掃描

on:
  schedule:
    - cron: '30 7 * * 1-5'   # UTC 07:30 = 台灣時間 15:30，週一至週五
  workflow_dispatch:            # 允許手動立即執行

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: ⬇️ 取得程式碼
        uses: actions/checkout@v4

      - name: 🐍 安裝 Python 套件
        run: |
          pip install yfinance pandas numpy scipy matplotlib mplfinance --quiet

      - name: 🔍 執行台股掃描
        run: python scan_tw50.py

      - name: 📤 推送報告
        run: |
          git config user.email "actions@github.com"
          git config user.name "CaiSen ScanBot"
          git add index.html signals.json
          git commit -m "📊 台股掃描報告 $(date '+%Y-%m-%d')" || echo "無新訊號變更"
          git push

      - name: 🚨 失敗通知
        if: failure()
        run: |
          echo "::error::掃描失敗！請至 Actions 頁面查看詳細 log"
          exit 1
