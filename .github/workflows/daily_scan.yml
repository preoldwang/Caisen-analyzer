name: 全台股蔡森每日掃描（Matrix 4 平行）

on:
  schedule:
    - cron: '35 7 * * 1-5'   # UTC 07:35 = 台灣時間 15:35，週一至週五
  workflow_dispatch:

jobs:
  # ── 前置檢查：今天是否為台股交易日 ─────────────────────
  check-trading-day:
    name: 確認台股交易日
    runs-on: ubuntu-latest
    outputs:
      is_trading_day: ${{ steps.check.outputs.is_trading_day }}
      trade_date: ${{ steps.check.outputs.trade_date }}

    steps:
      - name: 查詢 TWSE 確認今日是否開盤
        id: check
        run: |
          python3 - <<'PYEOF'
          import urllib.request, json, os, datetime

          today = datetime.date.today().strftime("%Y%m%d")
          url = f"https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL"

          try:
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=15) as resp:
                  data = json.loads(resp.read().decode())

              # 取第一筆確認日期
              if data and len(data) > 0:
                  api_date = data[0].get("Date", "")  # 格式: "1150428" (民國年)
                  # 轉換民國日期為西元
                  if len(api_date) == 7:
                      roc_year = int(api_date[:3])
                      western_date = str(roc_year + 1911) + api_date[3:]
                  else:
                      western_date = api_date

                  print(f"TWSE 最新資料日期: {western_date}")
                  print(f"今日日期: {today}")

                  # 若 TWSE 資料是今天 → 開盤日
                  if western_date == today:
                      print("is_trading_day=true")
                      with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                          f.write(f"is_trading_day=true\n")
                          f.write(f"trade_date={today}\n")
                  else:
                      print(f"今日非交易日（TWSE 最新資料為 {western_date}），跳過掃描")
                      with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                          f.write(f"is_trading_day=false\n")
                          f.write(f"trade_date={western_date}\n")
              else:
                  print("TWSE 回應空資料，視為非交易日")
                  with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                      f.write("is_trading_day=false\n")
                      f.write(f"trade_date={today}\n")

          except Exception as e:
              print(f"查詢失敗: {e}，保守視為非交易日")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("is_trading_day=false\n")
                  f.write(f"trade_date={today}\n")
          PYEOF

      - name: 顯示結果
        run: |
          echo "是否為交易日: ${{ steps.check.outputs.is_trading_day }}"
          echo "資料日期: ${{ steps.check.outputs.trade_date }}"

  # ── 第一階段：4 個平行掃描 Job ──────────────────────────
  scan:
    name: 掃描批次 ${{ matrix.chunk }}
    runs-on: ubuntu-latest
    needs: check-trading-day
    if: needs.check-trading-day.outputs.is_trading_day == 'true'
    strategy:
      matrix:
        chunk: [1, 2, 3, 4]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: 安裝套件
        run: pip install yfinance pandas numpy scipy matplotlib mplfinance --quiet

      - name: 執行掃描（批次 ${{ matrix.chunk }}/4）
        run: python scan_tw_full.py --chunk ${{ matrix.chunk }} --total 4

      - name: 上傳批次結果
        uses: actions/upload-artifact@v4
        with:
          name: signals-chunk-${{ matrix.chunk }}
          path: signals_chunk_${{ matrix.chunk }}.json
          retention-days: 1

  # ── 第二階段：合併結果 + 產出報告 ──────────────────────
  merge:
    name: 合併結果 & 發布報告
    runs-on: ubuntu-latest
    needs: [check-trading-day, scan]
    if: needs.check-trading-day.outputs.is_trading_day == 'true'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 下載所有批次結果
        uses: actions/download-artifact@v4
        with:
          pattern: signals-chunk-*
          merge-multiple: true

      - name: 合併並產出 HTML 報告
        run: python merge_tw_full.py

      - name: 推送報告到 GitHub
        run: |
          git config user.email "actions@github.com"
          git config user.name "CaiSen ScanBot"
          git add index.html signals.json
          git commit -m "📊 全台股掃描報告 $(date '+%Y-%m-%d')" || echo "無變更"
          git push

      - name: 掃描失敗通知
        if: failure()
        run: echo "::error::全台股掃描失敗，請至 Actions 查看 log"

  # ── 非交易日：靜默跳過 ───────────────────────────────
  skip:
    name: 非交易日，跳過
    runs-on: ubuntu-latest
    needs: check-trading-day
    if: needs.check-trading-day.outputs.is_trading_day == 'false'
    steps:
      - name: 記錄跳過原因
        run: |
          echo "⏭️  今日非台股交易日，掃描已跳過"
          echo "TWSE 最新資料日期: ${{ needs.check-trading-day.outputs.trade_date }}"
