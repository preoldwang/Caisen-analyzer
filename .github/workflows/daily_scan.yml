name: 全台股蔡森每日掃描（Matrix 4 平行）

on:
  schedule:
    - cron: '35 7 * * 1-5'
  workflow_dispatch:

jobs:
  check-trading-day:
    name: 確認台股交易日
    runs-on: ubuntu-latest
    outputs:
      is_trading_day: ${{ steps.check.outputs.is_trading_day }}
    steps:
      - name: 安裝 exchange_calendars
        run: pip install exchange_calendars --quiet
      - name: 判斷今日是否為台股交易日
        id: check
        run: |
          python3 - <<'PYEOF'
          import exchange_calendars as xcals, datetime, os
          twse = xcals.get_calendar("XTAI")
          today = datetime.date.today()
          is_trading = twse.is_session(today.strftime("%Y-%m-%d"))
          result = "true" if is_trading else "false"
          print(f"今日: {today} | 台股交易日: {result}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"is_trading_day={result}\n")
          PYEOF

  # ── 標準版：1年日線掃描 ────────────────────────────────
  scan-1y:
    name: 掃描 1Y 批次 ${{ matrix.chunk }}
    runs-on: ubuntu-latest
    needs: check-trading-day
    if: needs.check-trading-day.outputs.is_trading_day == 'true'
    strategy:
      matrix:
        chunk: [1, 2, 3, 4]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: 安裝套件
        run: pip install yfinance pandas numpy scipy matplotlib mplfinance --quiet
      - name: 執行掃描（1Y 批次 ${{ matrix.chunk }}/4）
        run: python scan_tw_full.py --chunk ${{ matrix.chunk }} --total 4 --period 1y
      - name: 上傳批次結果
        uses: actions/upload-artifact@v4
        with:
          name: signals-1y-chunk-${{ matrix.chunk }}
          path: signals_chunk_${{ matrix.chunk }}.json
          retention-days: 1

  # ── 強化版：2年週月線掃描 ──────────────────────────────
  scan-2y:
    name: 掃描 2Y 批次 ${{ matrix.chunk }}
    runs-on: ubuntu-latest
    needs: check-trading-day
    if: needs.check-trading-day.outputs.is_trading_day == 'true'
    strategy:
      matrix:
        chunk: [1, 2, 3, 4]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: 安裝套件
        run: pip install yfinance pandas numpy scipy matplotlib mplfinance --quiet
      - name: 執行掃描（2Y 批次 ${{ matrix.chunk }}/4）
        run: python scan_tw_full.py --chunk ${{ matrix.chunk }} --total 4 --period 2y
      - name: 上傳批次結果
        uses: actions/upload-artifact@v4
        with:
          name: signals-2y-chunk-${{ matrix.chunk }}
          path: signals_chunk_${{ matrix.chunk }}_2y.json
          retention-days: 1

  # ── 合併兩版本 + 發布 ──────────────────────────────────
  merge:
    name: 合併 & 發布雙版本報告
    runs-on: ubuntu-latest
    needs: [check-trading-day, scan-1y, scan-2y]
    if: needs.check-trading-day.outputs.is_trading_day == 'true'
    permissions:
      contents: write
    env:
      FAK:      ${{ secrets.FAK }}
      FS89:     ${{ secrets.FS89 }}
      FP:       ${{ secrets.FP }}
      SUP_link: ${{ secrets.SUP_link }}
      Supk:     ${{ secrets.Supk }}

    steps:
      - uses: actions/checkout@v4
      - name: 下載 1Y 批次結果
        uses: actions/download-artifact@v4
        with:
          pattern: signals-1y-chunk-*
          merge-multiple: true
      - name: 下載 2Y 批次結果
        uses: actions/download-artifact@v4
        with:
          pattern: signals-2y-chunk-*
          merge-multiple: true
      - name: 安裝必要套件
        run: pip install pandas --quiet
      - name: 嘗試安裝富邦 SDK（失敗不中斷）
        run: pip install fubon_neo --quiet || echo "fubon_neo 安裝失敗，權證橋接跳過"
      - name: 合併 1Y 報告（標準版）
        run: python merge_tw_full.py
      - name: 合併 2Y 報告（強化版）
        run: python merge_tw_2y.py
      - name: 推送報告
        run: |
          git config user.email "actions@github.com"
          git config user.name "CaiSen ScanBot"
          git add index.html index_2y.html history.html signals.json signals_2y.json
          git commit -m "📊 雙版本掃描報告 $(date '+%Y-%m-%d')" || echo "無變更"
          git push
      - name: 失敗通知
        if: failure()
        run: echo "::error::掃描失敗，請至 Actions 查看 log"

  skip:
    name: 非交易日，跳過
    runs-on: ubuntu-latest
    needs: check-trading-day
    if: needs.check-trading-day.outputs.is_trading_day == 'false'
    steps:
      - run: echo "⏭️ 今日非台股交易日，掃描已跳過"
