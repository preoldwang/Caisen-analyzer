name: 全台股蔡森每日掃描（Matrix 4 平行）

on:
  schedule:
    - cron: '35 7 * * 1-5'   # UTC 07:35 = 台灣時間 15:35，週一至週五
  workflow_dispatch:

jobs:
  # ── 前置檢查：今天是否為台股交易日 ─────────────────────
  check-trading-day:
    name: 確認台股交易日
    runs-on: ubuntu-latest
    outputs:
      is_trading_day: ${{ steps.check.outputs.is_trading_day }}

    steps:
      - name: 安裝 exchange_calendars
        run: pip install exchange_calendars --quiet

      - name: 判斷今日是否為台股交易日
        id: check
        run: |
          python3 - <<'PYEOF'
          import exchange_calendars as xcals
          import datetime, os

          twse = xcals.get_calendar("XTAI")
          today = datetime.date.today()

          is_trading = twse.is_session(today.strftime("%Y-%m-%d"))
          result = "true" if is_trading else "false"

          print(f"今日日期: {today}")
          print(f"台股交易日: {result}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"is_trading_day={result}\n")
          PYEOF

  # ── 第一階段：4 個平行掃描 Job ──────────────────────────
  scan:
    name: 掃描批次 ${{ matrix.chunk }}
    runs-on: ubuntu-latest
    needs: check-trading-day
    if: needs.check-trading-day.outputs.is_trading_day == 'true'
    strategy:
      matrix:
        chunk: [1, 2, 3, 4]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: 安裝套件
        run: pip install yfinance pandas numpy scipy matplotlib mplfinance --quiet

      - name: 執行掃描（批次 ${{ matrix.chunk }}/4）
        run: python scan_tw_full.py --chunk ${{ matrix.chunk }} --total 4

      - name: 上傳批次結果
        uses: actions/upload-artifact@v4
        with:
          name: signals-chunk-${{ matrix.chunk }}
          path: signals_chunk_${{ matrix.chunk }}.json
          retention-days: 1

  # ── 第二階段：合併 + 權證橋接 + 發布 ──────────────────
  merge:
    name: 合併結果 & 權證橋接 & 發布報告
    runs-on: ubuntu-latest
    needs: [check-trading-day, scan]
    if: needs.check-trading-day.outputs.is_trading_day == 'true'
    permissions:
      contents: write
    env:
      FAK:  ${{ secrets.FAK }}
      FS89: ${{ secrets.FS89 }}
      FP:   ${{ secrets.FP }}

    steps:
      - uses: actions/checkout@v4

      - name: 下載所有批次結果
        uses: actions/download-artifact@v4
        with:
          pattern: signals-chunk-*
          merge-multiple: true

      - name: 安裝套件（含富邦 SDK）
        run: pip install pandas fubon_neo --quiet

      - name: 合併 + 權證橋接 + 產出 HTML
        run: python merge_tw_full.py

      - name: 推送報告到 GitHub
        run: |
          git config user.email "actions@github.com"
          git config user.name "CaiSen ScanBot"
          git add index.html signals.json
          git commit -m "📊 全台股掃描報告 $(date '+%Y-%m-%d')" || echo "無變更"
          git push

      - name: 掃描失敗通知
        if: failure()
        run: echo "::error::全台股掃描失敗，請至 Actions 查看 log"

  # ── 非交易日：靜默跳過 ───────────────────────────────
  skip:
    name: 非交易日，跳過
    runs-on: ubuntu-latest
    needs: check-trading-day
    if: needs.check-trading-day.outputs.is_trading_day == 'false'
    steps:
      - name: 靜默結束
        run: echo "⏭️ 今日非台股交易日（假日或補班休市），掃描已跳過"
